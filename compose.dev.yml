services:
  fastapi:
    build:
      context: .
      dockerfile: ./docker/fastapi/Dockerfile
    image: "fastapi_dev"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src:cached
    env_file:
      - .env
    ports:
      - 8000:8000
  postgres:
    build:
      context: .
      dockerfile: ./docker/postgres/Dockerfile
    image: "fastapi_dev_postgres"
    volumes:
      - dev_postgres:/var/lib/postgresql/data:Z
      - dev_backups:/backups:z
    env_file:
      - ./.env
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dev_postgres:
  dev_backups:
