# Probot Settings - https://github.com/apps/settings
#
# Install the Settings app on your org/repo:
#   https://github.com/apps/settings
#
# Any push to .github/settings.yml on the default branch
# will automatically apply these settings to the repository.

repository:
  default_branch: main

  # Merge button settings
  allow_squash_merge: true
  allow_merge_commit: true
  allow_rebase_merge: false

  # Automatically delete head branches after PRs are merged
  delete_branch_on_merge: true

  # Security
  enable_vulnerability_alerts: true
  enable_automated_security_fixes: true

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 0
        dismiss_stale_reviews: true
        require_code_owner_reviews: false

      required_status_checks:
        strict: true
        contexts:
          - "Lint Python"
          - "Test Backend"

      enforce_admins: true
      required_linear_history: false
      restrictions: null

  - name: staging
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 0
        dismiss_stale_reviews: true
        require_code_owner_reviews: false

      required_status_checks:
        strict: true
        contexts:
          - "Lint Python"
          - "Test Backend"

      enforce_admins: true
      required_linear_history: false
      restrictions: null

  - name: develop
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 0
        dismiss_stale_reviews: true
        require_code_owner_reviews: false

      required_status_checks:
        strict: true
        contexts:
          - "Lint Python"

      enforce_admins: true
      required_linear_history: false
      restrictions: null
