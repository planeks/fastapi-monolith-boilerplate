---
# Backup role - sets up weekly database backup cron job (production only)

- name: Ensure backup directory exists
  file:
    path: "/home/{{ app_user }}/backups"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Ensure media backup directory exists
  file:
    path: "/home/{{ app_user }}/backups/media"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  when: backup_media_enabled

- name: Copy backup script to server
  copy:
    src: "{{ playbook_dir }}/../../scripts/backup.sh"
    dest: "/home/{{ app_user }}/backup.sh"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Setup weekly backup cron job
  vars:
    backup_cmd: "/home/{{ app_user }}/backup.sh {{ backup_compose_file }} {{ app_dir }} {{ backup_retention_days }}"
    media_flag: "{{ '--media /home/' + app_user + '/backups/media' if backup_media_enabled else '' }}"
    backup_log: "/home/{{ app_user }}/backup.log"
  cron:
    name: "Weekly database backup"
    minute: "{{ backup_schedule_minute }}"
    hour: "{{ backup_schedule_hour }}"
    weekday: "{{ backup_schedule_day }}"
    job: "{{ backup_cmd }} {{ media_flag }} >> {{ backup_log }} 2>&1"
    user: "{{ app_user }}"

- name: Display backup configuration
  debug:
    msg: |
      Backup configured:
      - Script: /home/{{ app_user }}/backup.sh
      - Schedule: Weekly on Sunday at {{ backup_schedule_hour }}:{{ backup_schedule_minute }}
      - Retention: {{ backup_retention_days }} days
      - Media: {{ 'Enabled' if backup_media_enabled else 'Disabled' }}
      - Log: /home/{{ app_user }}/backup.log
